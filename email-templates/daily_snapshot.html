<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Graphite Industry Snapshot</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:Arial,Helvetica,sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4;">
<tr><td align="center" style="padding:20px 0;">

<!-- Main Container -->
<table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;overflow:hidden;">

  <!-- Header -->
  <tr>
    <td style="background-color:#1a1a2e;padding:30px 40px;text-align:center;">
      <h1 style="color:#ffffff;margin:0;font-size:24px;">Daily Graphite Snapshot</h1>
      <p style="color:#a0a0c0;margin:8px 0 0;font-size:14px;">{{report_date}}</p>
    </td>
  </tr>

  <!-- Key Highlights -->
  <tr>
    <td style="padding:30px 40px 10px;">
      <h2 style="color:#1a1a2e;font-size:18px;margin:0 0 15px;border-bottom:2px solid #e6e6e6;padding-bottom:10px;">Key Highlights</h2>
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
        <tr>
          <td style="background-color:#f0f7ff;padding:15px;border-radius:6px;border-left:4px solid #3498db;">
            <p style="margin:0;color:#333;font-size:14px;line-height:1.6;">{{key_highlights}}</p>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- Full Summary -->
  <tr>
    <td style="padding:20px 40px 10px;">
      <h2 style="color:#1a1a2e;font-size:18px;margin:0 0 15px;border-bottom:2px solid #e6e6e6;padding-bottom:10px;">Full Summary</h2>
      <p style="color:#444;font-size:14px;line-height:1.7;margin:0;">{{full_summary}}</p>
    </td>
  </tr>

  <!-- Source Links -->
  <tr>
    <td style="padding:20px 40px 10px;">
      <h2 style="color:#1a1a2e;font-size:18px;margin:0 0 15px;border-bottom:2px solid #e6e6e6;padding-bottom:10px;">Sources</h2>
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
        {{source_links}}
      </table>
    </td>
  </tr>

  <!-- Footer -->
  <tr>
    <td style="padding:30px 40px;background-color:#f9f9f9;border-top:1px solid #e6e6e6;">
      <p style="color:#999;font-size:12px;margin:0;text-align:center;">
        FCI Competitive Intelligence Agent &bull; Generated by AI (GPT-5 mini)<br>
        Articles scraped: {{articles_count}} &bull; New today: {{new_articles_count}}
      </p>
    </td>
  </tr>

</table>
<!-- End Main Container -->

</td></tr>
</table>
</body>
</html>
